<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>update profile</title>
   
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">

   <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
   <section class="flex">
      <a href="home.html" class="logo">Study World</a>
      <form action="search.html" method="post" class="search-form">
         <input type="text" name="search_box" required placeholder="search courses..." maxlength="100">
         <button type="submit" class="fas fa-search"></button>
      </form>
      <div class="icons">
         <div id="menu-btn" class="fas fa-bars"></div>
         <div id="search-btn" class="fas fa-search"></div>
         <div id="user-btn" class="fas fa-user"></div>
         <div id="toggle-btn" class="fas fa-sun"></div>
      </div>
      <div class="profile">
         <img src="images/pic-1.jpg" class="image" alt="">
         <h3 class="name" id="profile-name">You..</h3>
         <p class="role">student</p>
         <a href="profile.html" class="btn">view profile</a>
         <div class="flex-btn">
            <button class="option-btn" style="width:100%; border:0; cursor:pointer;" id="logout-btn">logout</button>
         </div>
      </div>
   </section>
</header>   

<div class="side-bar">
   <div id="close-btn"><i class="fas fa-times"></i></div>
   <div class="profile">
      <img src="images/pic-1.jpg" class="image" alt="">
      <h3 class="name" id="sidebar-name">You..</h3>
      <p class="role">student</p>
      <a href="profile.html" class="btn">view profile</a>
   </div>
   <nav class="navbar">
      <a href="home.html"><i class="fas fa-home"></i><span>home</span></a>
      <a href="about.html"><i class="fas fa-question"></i><span>about</span></a>
      <a href="courses.html"><i class="fas fa-graduation-cap"></i><span>courses</span></a>
      <a href="teachers.html"><i class="fas fa-chalkboard-user"></i><span>teachers</span></a>
      <a href="contact.html"><i class="fas fa-headset"></i><span>contact us</span></a>
   </nav>
</div>

<section class="form-container">
   <form id="update-profile-form">
      <h3>update profile</h3>
      <p>update name</p>
      <input type="text" id="update-name" placeholder="Enter your name" class="box" required>
      <p>your school (optional)</p>
      <input type="text" id="update-school" placeholder="Enter your school name" class="box">
      <p>A/L Shy (optional)</p>
      <select id="update-shy" class="box" style="width: 100%; padding: 1.4rem; font-size: 1.8rem; background: var(--light-bg); border-radius: .5rem;">
         <option value="">Select your shy</option>
         <option value="1st Shy">1st Shy</option>
         <option value="2nd Shy">2nd Shy</option>
         <option value="3rd Shy">3rd Shy</option>
      </select>
      <p>your district (optional)</p>
      <input type="text" id="update-district" placeholder="Enter your district" class="box">
      <input type="submit" value="save profile" class="btn">
   </form>
</section>

<footer class="footer">
   &copy; copyright @ 2026 by <span>mr. Nisa designer</span> | all rights reserved!
</footer>

<script src="js/script.js"></script>
<script type="module" src="js/auth-check.js"></script>
<script>
    // වෙබ් අඩවිය පුරාම Right Click බ්ලොක් කිරීම
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });
</script>
</body>
</html>
