
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study World - Login & Register</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            
            /* ඔයා ඉල්ලපු ලස්සන ලා දම් පාට (Light Purple / Lavender) Gradient පසුබිම */
            background: linear-gradient(135deg, #d1c4e9, #b39ddb, #7e57c2);
            
            justify-content: center;
            align-items: center;
            color: #333; /* ලා පැහැති පසුබිමේ අකුරු හොඳින් පෙනීමට තද පැහැයක් යොදා ඇත */
            
            /* පිටුවේ ඇති අකුරු සහ පින්තූර Highlight/Select කිරීම වැළැක්වීමට (CSS Protection) */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .form-container {
            max-width: 320px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.45); /* Glassmorphism පෙනුම ලබා ගැනීමට සුදු පැහැය මදක් අඩු කර ඇත */
            border-radius: 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .form-header h3 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
            color: #4a148c; /* Dashboard එකේ දම් පාටට ගැලපෙන Header වර්ණය */
        }
        .input-container input {
            padding: 15px 20px;
            width: 100%;
            border-radius: 30px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            outline: none;
            color: #333;
            box-sizing: border-box;
        }
        input::placeholder { color: #757575; font-size: 0.85rem; }
        .submit {
            width: 100%; padding: 15px; border-radius: 30px; border: 0;
            margin-bottom: 20px; font-weight: 900; 
            background: #7c4dff; /* Button එක සඳහා කැපී පෙනෙන දම් පැහැයක් */
            cursor: pointer; color: white; text-transform: uppercase;
            transition: 0.3s ease;
            box-shadow: 0 5px 15px rgba(124, 77, 255, 0.3);
        }
        .submit:hover {
            background: #651fff;
            transform: scale(1.02);
        }
        .signup { text-align: center; font-size: 14px; color: #555; }
        .signup a { text-decoration: none; color: #4a148c; font-weight: bold; text-decoration: underline; }
        
        .page-section { display: none; }
        .page-section.active { display: flex; justify-content: center; align-items: center; width: 100%; }
    </style>
</head>
<body>

    <div id="login-section" class="page-section active">
        <div class="form-container">
            <div class="form-header"><h3>Log In</h3></div>
            <form id="login-form">
                <div class="input-container">
                    <input type="email" id="login-email" placeholder="Email Address" required> 
                    <input type="password" id="login-password" placeholder="Password" required> 
                    <button class="submit" type="submit">LOG IN</button> 
                    <div class="signup">
                        Don't Have An Account? <a href="#" onclick="showSection('signup-section')">Sign Up</a>  
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="signup-section" class="page-section">
        <div class="form-container">
            <div class="form-header"><h3>Sign Up</h3></div>
            <form id="signup-form">
                <div class="input-container">
                    <input type="text" id="signup-username" placeholder="Username" required> 
                    <input type="email" id="signup-email" placeholder="Email Address" required> 
                    <input type="password" id="signup-password" placeholder="Create Password" required>
                    <button class="submit" type="submit">SIGN UP</button> 
                    <div class="signup">
                         Already Have An Account? <a href="#" onclick="showSection('login-section')">Log In</a>  
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. Right-Click මෙනු එක බ්ලොක් කිරීම
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // 2. F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U වැනි කෙටිමං බ්ලොක් කිරීම
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
                e.preventDefault();
                return false;
            }
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCmciwmEbSDgA5PhCY12a_vKqXl4GDBeZ8",
            authDomain: "school-project-5fe93.firebaseapp.com",
            projectId: "school-project-5fe93",
            storageBucket: "school-project-5fe93.firebasestorage.app",
            messagingSenderId: "548925209782",
            appId: "1:548925209782:web:cea0aac7d41a510b2fba17",
            measurementId: "G-5MG8T54708"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.showSection = function(sectionId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }

        // SIGN UP PROCESS
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signup-username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    username: username,
                    email: email,
                    status: "pending"
                });

                alert("ලියාපදිංචිය සාර්ථකයි! දැන් Log In වෙන්න.");
                document.getElementById('signup-form').reset();
                showSection('login-section');
            } catch (error) {
                alert("Error: " + error.message);
            }
        });

        // LOG IN PROCESS
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, {
                    lastLogin: serverTimestamp(),  
                    loginCount: increment(1)       
                });

                window.location.href = "home.html";
            } catch (error) {
                alert("Login Failed: " + error.message);
            }
        });
    </script>
</body>
</html>
