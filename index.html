<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study World - Login & Register</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: url('nature.jpeg') no-repeat center center fixed;
            background-size: cover;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .form-container {
            max-width: 320px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 0 15px black;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-header h3 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
        }
        .input-container input {
            padding: 15px 20px;
            width: 100%;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 1rem;
            outline: none;
            color: white;
            box-sizing: border-box;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.8); font-size: 0.85rem; }
        .submit {
            width: 100%; padding: 15px; border-radius: 30px; border: 0;
            margin-bottom: 20px; font-weight: 900; background: white;
            cursor: pointer; color: black; text-transform: uppercase;
            transition: 0.3s ease;
        }
        .submit:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }
        .signup { text-align: center; font-size: 14px; color: #ddd; }
        .signup a { text-decoration: none; color: white; font-weight: bold; text-decoration: underline; }
        
        .page-section { display: none; }
        .page-section.active { display: flex; justify-content: center; align-items: center; width: 100%; }
    </style>
</head>
<body>

    <div id="login-section" class="page-section active">
        <div class="form-container">
            <div class="form-header"><h3>Log In</h3></div>
            <form id="login-form">
                <div class="input-container">
                    <input type="email" id="login-email" placeholder="Email Address" required> 
                    <input type="password" id="login-password" placeholder="Password" required> 
                    <button class="submit" type="submit">LOG IN</button> 
                    <div class="signup">
                        Don't Have An Account? <a href="#" onclick="showSection('signup-section')">Sign Up</a>  
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="signup-section" class="page-section">
        <div class="form-container">
            <div class="form-header"><h3>Sign Up</h3></div>
            <form id="signup-form">
                <div class="input-container">
                    <input type="text" id="signup-username" placeholder="Username" required> 
                    <input type="email" id="signup-email" placeholder="Email Address" required> 
                    <input type="password" id="signup-password" placeholder="Create Password" required>
                    <button class="submit" type="submit">SIGN UP</button> 
                    <div class="signup">
                         Already Have An Account? <a href="#" onclick="showSection('login-section')">Log In</a>  
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // 🌟 updateDoc, increment, serverTimestamp මෙතනට Import කරගත්තා
        import { getFirestore, doc, setDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCmciwmEbSDgA5PhCY12a_vKqXl4GDBeZ8",
            authDomain: "school-project-5fe93.firebaseapp.com",
            projectId: "school-project-5fe93",
            storageBucket: "school-project-5fe93.firebasestorage.app",
            messagingSenderId: "548925209782",
            appId: "1:548925209782:web:cea0aac7d41a510b2fba17",
            measurementId: "G-5MG8T54708"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.showSection = function(sectionId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }

        // SIGN UP PROCESS
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signup-username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    username: username,
                    email: email,
                    status: "pending"
                });

                alert("ලියාපදිංචිය සාර්ථකයි! දැන් Log In වෙන්න.");
                document.getElementById('signup-form').reset();
                showSection('login-section');
            } catch (error) {
                alert("Error: " + error.message);
            }
        });

        // LOG IN PROCESS (🌟 ට්‍රැකර් එක ඇතුළත් කර යාවත්කාලීන කරන ලදී)
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 🚀 ශිෂ්‍යයා සාර්ථකව Login වූ පසු Firestore දත්ත Update කරන කොටස
                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, {
                    lastLogin: serverTimestamp(),  // වත්මන් වේලාව සහ දිනය
                    loginCount: increment(1)       // පරණ වාර ගණනට 1ක් එකතු කරයි
                });

                // සාර්ථකව ලොග් වුණොත් විතරක් home.html එකට යවයි
                window.location.href = "home.html";
            } catch (error) {
                alert("Login Failed: " + error.message);
            }
        });
    </script>
</body>
</html>
